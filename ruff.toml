# Ruff linter and formatter configuration
target-version = "py312"
line-length = 100
src = ["src", "tests"]

[lint]
select = ["E", "F", "W", "I", "N", "UP", "S", "B", "A", "COM", "C4", "PT", "RET", "SIM"]
ignore = ["COM812", "S101"]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S106"]

[lint.isort]
known-first-party = ["context_manager"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
